[project]
name = "electrical-base"
version = "1.0.0-beta"
requires-python = ">=3.13"
dependencies = [
    "sympy>=1.13.0",
    "pint>=0.24.0",
    "uncertainties>=3.2.0",
    "numpy>=2.1.0",
    "scipy>=1.14.0",
    "matplotlib>=3.9.0",
    "pydantic>=2.9.2",
    "pyyaml>=6.0.2",
    "PySpice>=1.5",
    "schemdraw>=0.19",
]

[dependency-groups]
dev = [
    "black[d]>=24.10.0",
    "poethepoet>=0.32.0",
    "pytest>=8.3.4",
    "ruff>=0.8.4",
    "pytest-cov>=6.0.0",
    "jupyter>=1.0.0",
    "nbconvert>=7.16.0",
    "pip>=25.1.1",
]

[tool.poe.tasks]
format = "black ."
lint = "ruff check"
checks = ["format", "lint"]
notebook = "jupyter nbconvert --execute --inplace theory.ipynb"
sch-theme = "bash -c 'mkdir -p ~/.config/kicad/9.0/colors && cp cad/kicad-spice-theme.json ~/.config/kicad/9.0/colors/engineering.json'"
schematic = "eeschema cad/rc_charging.kicad_sch"
sch-svg = "bash -c 'mkdir -p cad/drawings && kicad-cli sch export svg cad/rc_charging.kicad_sch -t engineering -e -n -o cad/drawings/'"
sch-pdf = "bash -c 'mkdir -p cad/drawings spec && kicad-cli sch export pdf cad/rc_charging.kicad_sch -t engineering -o cad/drawings/rc_charging.pdf && cp cad/drawings/rc_charging.pdf spec/'"
sch-erc = "kicad-cli sch erc cad/rc_charging.kicad_sch"
sim = "pytest -vv sim/"
cover = "pytest -vv --cov sim/"
review = "claude 'run code-reviewer agent against diff for quality and elegance'"
commit = "bash -c 'uv run poe checks && uv run poe cover && uv run poe review && git add -A && git cz && git push'"

[tool.coverage.run]
omit = ["*/test_*.py"]
