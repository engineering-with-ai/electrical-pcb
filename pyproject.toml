[project]
name = "electrical-base"
version = "1.0.0-beta"
requires-python = "==3.13.2"
dependencies = [
    "sympy>=1.13.0",
    "pint>=0.24.0",
    "uncertainties>=3.2.0",
    "numpy>=2.1.0",
    "scipy>=1.14.0",
    "matplotlib>=3.9.0",
    "pydantic>=2.9.2",
    "pyyaml>=6.0.2",
    "PySpice>=1.5",
    "schemdraw>=0.19",
    "skidl>=2.0",
    "kicad-sch-api>=0.5.6",
]

[dependency-groups]
dev = [
    "black[d]>=24.10.0",
    "poethepoet>=0.32.0",
    "pytest>=8.3.4",
    "ruff>=0.8.4",
    "pytest-cov>=6.0.0",
    "jupyter>=1.0.0",
    "nbconvert>=7.16.0",
    "pip>=25.1.1",
]

# Workflow: checks → notebook → build → sim → inspect (manual PCB layout) → export → validate
# PCB layout flow: build generates netlist → inspect opens KiCad → import netlist, place, route → commit .kicad_pcb → export
[tool.poe.tasks]
format = "black ."
lint = "ruff check"
checks = ["format", "lint"]
notebook = "jupyter nbconvert --execute --inplace theory.ipynb"
build = { cmd = "python cad/model.py", env = { PYTHONPATH = "." } }
inspect-model = "bash -c 'nohup eeschema cad/buck_converter.kicad_sch &>/dev/null &'"
validate-model = "kicad-cli sch erc cad/buck_converter.kicad_sch"
inspect-asm = "bash -c 'nohup pcbnew cad/buck_converter.kicad_pcb &>/dev/null & || echo \"Run poe build, then layout PCB in KiCad first\"'"
drawings = "bash -c 'mkdir -p spec/drawings && kicad-cli sch export svg cad/buck_converter.kicad_sch -b -e -n -o spec/drawings/ && kicad-cli sch export pdf cad/buck_converter.kicad_sch -b --drawing-sheet cad/drawing-sheet.kicad_wks -o spec/drawings/buck_converter.pdf'"
sim = "pytest -vv sim/"
cover = "pytest -vv --cov sim/"
review = "claude 'run code-reviewer agent against diff for quality and elegance'"
commit = "bash -c 'uv run poe checks && uv run poe cover && uv run poe review && git add -A && git cz && git push'"

[tool.coverage.run]
omit = ["*/test_*.py"]
